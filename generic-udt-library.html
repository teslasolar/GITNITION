<html lang="en">

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Generic UDT Library — 70 UDTs · deep nested</title>
<style>
:root{--bg:#0b0e16;--card:#11151f;--b:#1f2638;--t:#cfd6e6;--t2:#7d89a3;
--ig:#38b5f9;--ok:#42e898;--err:#ff4466;--lav:#b496ff;--gold:#ffd166;--mono:'JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,monospace}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--t);font-family:var(--mono);font-size:12px;line-height:1.5;height:100%}
.app{display:grid;grid-template-rows:auto 1fr;height:100vh;min-height:0}
.hdr{display:flex;align-items:center;gap:14px;padding:8px 16px;border-bottom:1px solid var(--b);background:var(--card)}
.hdr h1{margin:0;font-size:13px;font-weight:600;color:var(--ig);letter-spacing:.5px}
.hdr .stats{color:var(--t2);font-size:10px;display:flex;gap:10px}
.hdr .stats b{color:var(--gold);font-weight:500}
.hdr .grow{flex:1}
.hdr button{font-family:inherit;font-size:10px;padding:5px 10px;background:var(--card);border:1px solid var(--b);color:var(--t);cursor:pointer;border-radius:3px;transition:.15s}
.hdr button:hover{border-color:var(--ig);color:var(--ig)}
.hdr button.go{border-color:var(--ig);color:var(--ig)}
.hdr button.go:hover{background:var(--ig);color:var(--bg)}

.body{display:grid;grid-template-columns:1fr 1.4fr;gap:1px;background:var(--b);min-height:0;overflow:hidden}
.pane{background:var(--card);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.pane h2{margin:0;padding:6px 12px;font-size:10px;font-weight:600;color:var(--t2);letter-spacing:.6px;border-bottom:1px solid var(--b);background:var(--bg);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.pane h2 .badge{background:var(--card);color:var(--ig);padding:1px 6px;border-radius:8px;font-size:9px;border:1px solid var(--b)}
.pane .body{flex:1;min-height:0;overflow:hidden;background:var(--card)}
textarea{width:100%;height:100%;background:var(--bg);color:var(--ok);border:none;padding:10px 14px;font-family:inherit;font-size:10px;resize:none;outline:none;line-height:1.4}
.tree{flex:1;overflow:auto;padding:6px 4px;font-size:11px}
.tn{margin-left:0}
.tl{display:flex;align-items:center;gap:5px;padding:2px 6px;cursor:pointer;border-radius:3px;user-select:none;white-space:nowrap}
.tl:hover{background:var(--bg)}
.tl .arr{color:var(--t2);font-size:8px;width:8px;display:inline-block;text-align:center;transition:.1s}
.tn.open>.tl>.arr{transform:rotate(90deg)}
.tc{display:none;margin-left:14px;border-left:1px solid var(--b);padding-left:6px}
.tn.open>.tc{display:block}
.tn.leaf>.tl>.arr{visibility:hidden}
.k{color:var(--gold)}.k-udt{color:var(--ig);font-weight:600}.k-inst{color:var(--lav)}.k-folder{color:var(--t)}.k-atom{color:var(--ok)}
.tag{font-size:8.5px;color:var(--t2);background:var(--bg);padding:0 5px;border-radius:7px;border:1px solid var(--b)}
.tag.t{color:var(--ok)}.tag.u{color:var(--lav)}.tag.f{color:var(--t2)}.tag.U{color:var(--ig)}
.dimmed{color:var(--t2);font-size:9.5px;margin-left:4px}
.search{padding:6px 8px;border-bottom:1px solid var(--b);background:var(--bg)}
.search input{width:100%;background:var(--card);border:1px solid var(--b);color:var(--t);padding:5px 8px;border-radius:3px;font-family:inherit;font-size:10px;outline:none}
.search input:focus{border-color:var(--ig)}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:var(--ig);color:var(--bg);padding:7px 14px;font-size:10px;border-radius:4px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99}
.toast.on{opacity:1}
.match{background:rgba(56,181,249,.15);border-radius:2px}
@media (max-width:880px){.body{grid-template-columns:1fr;grid-template-rows:1fr 1fr}}
</style>
</head>

<script>
const PAYLOAD = JSON.parse(document.getElementById('udtJson').value);

const ICONS = {
  Folder:    {cls:'k-folder', icon:'📁'},
  UdtType:   {cls:'k-udt',    icon:'🧬'},
  UdtInstance:{cls:'k-inst',  icon:'🪞'},
  AtomicTag: {cls:'k-atom',   icon:'•'},
};

function renderNode(node, path=''){
  const t = node.tagType || 'AtomicTag';
  const ic = ICONS[t] || ICONS.AtomicTag;
  const kids = node.tags || [];
  const isLeaf = !kids.length;
  const myPath = path ? path + '/' + (node.name||'?') : (node.name||'?');
  let label = '';
  if (t === 'AtomicTag') {
    label = `<span class="${ic.cls}">${node.name}</span> <span class="tag t">${node.valueType||'?'}</span>`;
    if (node.engUnit) label += ` <span class="dimmed">${node.engUnit}</span>`;
    if (node.documentation) label += ` <span class="dimmed">${node.documentation.slice(0,60)}</span>`;
  } else if (t === 'UdtInstance') {
    label = `<span class="${ic.cls}">${node.name}</span> <span class="tag u">→ ${(node.typeId||'').split('/').pop()}</span>`;
  } else if (t === 'UdtType') {
    const params = node.parameters?.length ? ` <span class="dimmed">(${node.parameters.join(',')})</span>` : '';
    label = `<span class="${ic.cls}">${node.name}</span> <span class="tag U">UDT</span>${params}`;
    if (node.description) label += ` <span class="dimmed">${node.description.slice(0,80)}</span>`;
  } else {
    label = `<span class="${ic.cls}">${node.name}</span> <span class="tag f">folder · ${kids.length}</span>`;
  }
  const open = (t==='Folder' && (node.name==='Generic' || path==='Generic')) ? 'open' : '';
  return `<div class="tn ${isLeaf?'leaf':''} ${open}" data-path="${myPath}" data-name="${(node.name||'').toLowerCase()}">
    <div class="tl" onclick="this.parentElement.classList.toggle('open')">
      <span class="arr">▶</span><span style="font-size:10px">${ic.icon}</span>${label}
    </div>
    ${kids.length ? `<div class="tc">${kids.map(k=>renderNode(k,myPath)).join('')}</div>` : ''}
  </div>`;
}

function rebuild(){
  document.getElementById('tree').innerHTML = renderNode(PAYLOAD);
  updateVisCount();
}

function updateVisCount(){
  const all = document.querySelectorAll('#tree .tn').length;
  const hidden = document.querySelectorAll('#tree .tn[style*="display: none"]').length;
  document.getElementById('visCount').textContent = (all-hidden) + ' / ' + all + ' nodes';
}

// ─── Controls ──────────────────────────────────────────────────────────────
const ta = document.getElementById('udtJson');
function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('on');
  clearTimeout(t._tmr); t._tmr = setTimeout(()=>t.classList.remove('on'), 1600);
}
document.getElementById('copyBtn').onclick = async () => {
  try { await navigator.clipboard.writeText(ta.value); toast('✓ JSON copied to clipboard'); }
  catch (e) { ta.select(); document.execCommand('copy'); toast('✓ Copied (fallback)'); }
};
document.getElementById('downloadBtn').onclick = () => {
  const blob = new Blob([ta.value], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'generic-udt-library.json';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  toast('✓ Downloaded generic-udt-library.json');
};
document.getElementById('selectBtn').onclick = () => { ta.focus(); ta.select(); toast('✓ Selected — Ctrl+C'); };
document.getElementById('expandBtn').onclick = () => {
  document.querySelectorAll('#tree .tn:not(.leaf)').forEach(n=>n.classList.add('open'));
};
document.getElementById('collapseBtn').onclick = () => {
  document.querySelectorAll('#tree .tn').forEach(n=>n.classList.remove('open'));
  document.querySelectorAll('#tree > .tn').forEach(n=>n.classList.add('open'));
};

// ─── Search / filter ───────────────────────────────────────────────────────
const searchIn = document.getElementById('searchIn');
searchIn.addEventListener('input', () => {
  const q = searchIn.value.trim().toLowerCase();
  const all = document.querySelectorAll('#tree .tn');
  if (!q) { all.forEach(n=>{n.style.display=''; n.classList.remove('match');}); updateVisCount(); return; }
  // Show matching nodes + all their ancestors, hide siblings of non-matches
  all.forEach(n=>n.style.display='none');
  const matches = [];
  all.forEach(n=>{
    if ((n.dataset.name||'').includes(q)) {
      matches.push(n);
      n.classList.add('match','open');
      // walk up
      let p = n.parentElement;
      while (p && p.id !== 'tree') {
        if (p.classList && p.classList.contains('tn')) {
          p.style.display='';
          p.classList.add('open');
        }
        p = p.parentElement;
      }
      n.style.display='';
      // show kids
      n.querySelectorAll('.tn').forEach(k=>k.style.display='');
    } else {
      n.classList.remove('match');
    }
  });
  updateVisCount();
});

rebuild();
</script>
